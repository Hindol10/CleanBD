<!DOCTYPE html>
<html>
<head>
    <title>CleanBD Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body style="margin:0; font-family:Arial;">

<!-- Navbar -->
<div style="background:#1b5e20; color:white; padding:20px; text-align:center;">
    <h1>🌍 CleanBD Pollution Map</h1>

    <a href="/" style="color:white; margin-right:15px;">Home</a>
    <a href="/report" style="color:white; margin-right:15px;">Report</a>
    <a href="/dashboard" style="color:white;">Dashboard</a>
</div>

<!-- Map -->
<div id="map" style="height:90vh;"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
var map = L.map('map').setView([24.523546, 92.032265], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);
</script>
<script>

var reports = JSON.parse('{{ reports | tojson | safe }}');

reports.forEach(function(r) {

    if (r[4] && r[5]) {

        var iconColor = "blue";

        if (r[2] == "Plastic Waste") {
            iconColor = "red";
        }

        else if (r[2] == "Garbage") {
            iconColor = "green";
        }

        else if (r[2] == "Blocked Drain") {
            iconColor = "orange";
        }

        else if (r[2] == "Water Pollution") {
            iconColor = "blue";
        }

        var customIcon = new L.Icon({
            iconUrl:
            'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-' 
            + iconColor + '.png',

            shadowUrl:
            'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',

            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

        L.marker([r[4], r[5]], {
            icon: customIcon
        })
        .addTo(map)
        .bindPopup(
            "<b>" + r[2] + "</b><br>" + r[3]
        );
    }

});

</script>
<script>

var heatPoints = [];

reports.forEach(function(r) {

    if (r[4] && r[5]) {

        heatPoints.push([
            parseFloat(r[4]),
            parseFloat(r[5]),
            1
        ]);

    }

});

L.heatLayer(heatPoints, {
    radius: 35,
    blur: 20
}).addTo(map);

</script>
</body>
</html>
